name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci

      - name: Cache Dirt-Samples
        id: samples-cache
        uses: actions/cache@v4
        with:
          path: samples
          key: dirt-samples-v1

      - name: Clone Dirt-Samples
        if: steps.samples-cache.outputs.cache-hit != 'true'
        run: bash scripts/setup-samples.sh

      - run: npx vitest run
